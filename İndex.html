<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bedava Robux!</title>
    <style>
        /* Telefon ekranına göre temel ayarlar */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial Black', sans-serif;
            touch-action: manipulation; /* Yanlışlıkla zoom yapmayı engeller */
        }

        /* Mobil Uyumlu Dev Buton */
        #baslat-btn {
            width: 80%; /* Telefonun genişliğine göre */
            padding: 30px;
            font-size: 24px;
            color: gold;
            background: linear-gradient(180deg, #444, #000);
            border: 5px solid #555;
            border-radius: 20px;
            text-transform: uppercase;
            box-shadow: 0 10px 0 #222;
            z-index: 100;
        }

        #baslat-btn:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #222;
        }

        /* Şaka Ekranı */
        #saka-ekrani {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
        }

        /* Virüs Flaş Efekti */
        .virus-flash {
            animation: flash-bg 0.1s infinite;
        }

        @keyframes flash-bg {
            0% { background-color: #ff0000; }
            50% { background-color: #000; }
            100% { background-color: #ff0000; }
        }

        /* RIAS (Telefonda sol alt köşe) */
        #rias-resmi {
            position: absolute;
            bottom: 0;
            left: -10%; /* Hafif dışarıdan çıksın */
            height: 60%; /* Telefonda çok yer kaplamasın */
            z-index: 1005;
            filter: drop-shadow(0 0 15px red);
        }

        /* GIGA CHAD (Telefonda sağ alt köşe) */
        #giga-chad {
            position: absolute;
            bottom: 0;
            right: -5%;
            height: 70%;
            z-index: 1006;
            filter: drop-shadow(0 0 15px #00ff00);
        }

        /* Sigma Yazısı (Mobil için küçültüldü) */
        #sigma-mesaj {
            position: absolute;
            top: 15%;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 30px;
            font-weight: bold;
            text-shadow: 3px 3px 0 #000;
            z-index: 1010;
            display: none;
            padding: 0 10px;
            box-sizing: border-box;
        }

        /* Mobil Kırık Ekran */
        #kirik-efekt {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ibb.co/3sX8M8K/cracked-screen.png');
            background-size: cover;
            background-position: center;
            opacity: 0.8;
            pointer-events: none;
            z-index: 1100;
        }
    </style>
</head>
<body>

    <button id="baslat-btn">🎁 BEDAVA 10.000 ROBUX AL</button>

    <div id="saka-ekrani">
        <div id="sigma-mesaj">SİSTEM ÇÖKTÜ <br> GIGA CHAD SİZİ İZLİYOR</div>
        
        <img id="rias-resmi" src="rias_v2.jpg" alt="Rias">
        
        <img id="giga-chad" src="https://i.kym-cdn.com/entries/icons/original/000/026/152/gigachad.jpg" alt="Giga Chad">
        
        <div id="kirik-efekt"></div>
    </div>

    <script>
        const buton = document.getElementById('baslat-btn');
        const sakaEkrani = document.getElementById('saka-ekrani');
        const mesaj = document.getElementById('sigma-mesaj');

        buton.addEventListener('click', function() {
            // Mobil tarayıcılarda ardışık uyarılar çok etkili olur
            alert("⚠️ UYARI: Robux sunucusuna bağlanılamıyor!");
            alert("⚠️ HATA: Cihazınızda şüpheli bir dosya bulundu!");
            alert("⚠️ KRİTİK: Virüs tüm rehbere gönderiliyor...");

            buton.style.display = 'none';
            sakaEkrani.style.display = 'block';
            mesaj.style.display = 'block';
            document.body.classList.add('virus-flash');

            // Ses Motoru (Telefonda yüksek sesle çalması için)
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(60, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 1);
                
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 6);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 6);
            } catch (e) { console.log("Ses hatası."); }
        });
    </script>
</body>
</html>

</html>
