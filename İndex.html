<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürpriz Oyun!</title>
    <style>
        /* Tüm ekranı kaplayan temel stil */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Başlangıç Butonu */
        #baslat-btn {
            padding: 25px 50px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #2ecc71, #27ae60);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
            z-index: 100;
        }

        #baslat-btn:hover {
            transform: scale(1.1);
            background: linear-gradient(45deg, #27ae60, #2ecc71);
        }

        /* Şaka Ekranı Konfigürasyonu */
        #saka-ekrani {
            display: none; /* Başlangıçta gizli */
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 999;
        }

        /* Kırmızı-Siyah Virüs Efekti */
        .virus-flash {
            animation: flash-bg 0.15s infinite;
        }

        @keyframes flash-bg {
            0% { background-color: red; }
            50% { background-color: black; }
            100% { background-color: red; }
        }

        /* Rias Gremory Görseli */
        #rias-resmi {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 500px;
            z-index: 1001;
            filter: drop-shadow(0 0 30px #ff0000);
        }

        /* Kırık Ekran Katmanı */
        #kirik-efekt {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://freepngimg.com/save/28659-cracked-screen-transparent-background/420x306');
            background-size: cover;
            background-position: center;
            opacity: 0.8;
            pointer-events: none;
            z-index: 1002;
        }
    </style>
</head>
<body>

    <button id="baslat-btn">OYUNU BAŞLAT 🎮</button>

    <div id="saka-ekrani">
        <img id="rias-resmi" src="https://i.pinimg.com/736x/85/4c/26/854c26a7e04f981eb3cb91dcc4f57270.jpg" alt="Rias">
        <div id="kirik-efekt"></div>
    </div>

    <script>
        const buton = document.getElementById('baslat-btn');
        const sakaEkrani = document.getElementById('saka-ekrani');

        buton.addEventListener('click', function() {
            // 1. Uyarı Mesajları (Sırayla çıkar)
            alert("SİSTEM HATASI: Bilinmeyen bir kaynak dosyalarınıza erişiyor!");
            alert("UYARI: C:\Windows\System32 siliniyor...");
            alert("Trojan:Win32/RiasGremory.A tespit edildi!");
            alert("Cihazınızın kontrolü ele geçirildi. Geçmiş olsun :)");

            // 2. Arayüzü Değiştir
            buton.style.display = 'none';
            sakaEkrani.style.display = 'block';
            document.body.classList.add('virus-flash');

            // 3. Garip Ses Efekti (Web Audio API)
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sawtooth'; // Rahatsız edici testere dişi sesi
                oscillator.frequency.setValueAtTime(50, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 1.5);
                
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 5);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 5);
            } catch (e) {
                console.log("Ses çalınamadı, tarayıcı engellemiş olabilir.");
            }
        });
    </script>
</body>
</html>
